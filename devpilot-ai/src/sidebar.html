<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPilot AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #1e1e1e; color: #ffffff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 15px; background-color: #252526; border-bottom: 1px solid #3c3c3c; display: flex; align-items: center; gap: 10px; }
        .header h2 { color: #4fc3f7; font-size: 16px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 90%; font-size: 13px; line-height: 1.6; }
        .message.user { background-color: #0e639c; align-self: flex-end; }
        .message.ai { background-color: #2d2d2d; align-self: flex-start; border: 1px solid #3c3c3c; }
        .message.ai p { margin-bottom: 8px; }
        .message.ai strong { color: #4fc3f7; }
        .message.ai code { background: #3c3c3c; padding: 2px 4px; border-radius: 3px; font-family: monospace; font-size: 12px; }
        .message.ai pre { background: #1a1a1a; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
        .message.ai ul, .message.ai ol { padding-left: 20px; margin: 8px 0; }
        .input-container { padding: 15px; background-color: #252526; border-top: 1px solid #3c3c3c; display: flex; flex-direction: column; gap: 8px; }
        .analyze-btn { width: 100%; background-color: #2ea043; color: white; border: none; border-radius: 6px; padding: 8px; cursor: pointer; font-size: 13px; }
        .analyze-btn:hover { background-color: #3fb950; }
        .input-row { display: flex; gap: 8px; }
        textarea { flex: 1; background-color: #3c3c3c; color: #ffffff; border: none; border-radius: 6px; padding: 8px; font-size: 13px; resize: none; height: 60px; outline: none; }
        .send-btn { background-color: #0e639c; color: white; border: none; border-radius: 6px; padding: 8px 15px; cursor: pointer; font-size: 13px; }
        .send-btn:hover { background-color: #1177bb; }
        .welcome { text-align: center; color: #888; margin-top: 50px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="header"><h2>🚀 DevPilot AI</h2></div>
    <div class="chat-container" id="chat">
        <div class="welcome">
            <p>👋 Hello! I'm DevPilot AI</p>
            <p>Ask me anything about your code!</p>
        </div>
    </div>
    <div class="input-container">
        <button class="analyze-btn" onclick="analyzeCode()">🔍 Analyze My Code</button>
        <div class="input-row">
            <textarea id="input" placeholder="Ask anything about your code..."></textarea>
            <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        const vscode = acquireVsCodeApi();
        let streamingDiv = null;
        let streamingText = '';

        function analyzeCode() {
            vscode.postMessage({ command: 'analyzeCode' });
            addMessage('Analyzing your code...', 'user');
        }

        function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;
            addMessage(message, 'user');
            input.value = '';
            vscode.postMessage({ command: 'ask', text: message });
        }

        function addMessage(text, type) {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            if (type === 'ai') {
                div.innerHTML = marked.parse(text);
            } else {
                div.textContent = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        window.addEventListener('message', event => {
            const message = event.data;
            if (message.command === 'response') {
                addMessage(message.text, 'ai');
            } else if (message.command === 'startStream') {
                streamingText = '';
                const chat = document.getElementById('chat');
                streamingDiv = document.createElement('div');
                streamingDiv.className = 'message ai';
                chat.appendChild(streamingDiv);
                chat.scrollTop = chat.scrollHeight;
            } else if (message.command === 'streamChunk') {
                if (streamingDiv) {
                    streamingText += message.text;
                    streamingDiv.innerHTML = marked.parse(streamingText);
                    const chat = document.getElementById('chat');
                    chat.scrollTop = chat.scrollHeight;
                }
            } else if (message.command === 'endStream') {
                if (streamingDiv) {
                    streamingDiv.innerHTML = marked.parse(streamingText);
                }
                streamingDiv = null;
                streamingText = '';
            }
        });

        document.getElementById('input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
